<style>
:root {
  --navy:#0D2340;--navy-mid:#1a3a60;--navy-light:#2d5a8e;
  --gold:#D4A843;--gold-light:#e8c068;--cream:#F8F5F0;
  --white:#FFFFFF;--gray-100:#f0ede8;--gray-200:#e0dcd4;
  --gray-400:#9a9490;--gray-600:#6a6460;--text:#1a1410;
  --bg:var(--cream);--surface:#fff;--border:var(--gray-200);
  --txt:var(--text);--txt-muted:var(--gray-600);
  --radius:4px;
  --shadow:0 1px 3px rgba(13,35,64,.12),0 4px 12px rgba(13,35,64,.08);
  --shadow-lg:0 8px 32px rgba(13,35,64,.18);
}
:root:not([data-theme="dark"]) {
  /* Couleurs de base - Vision Complète */
  --navy:        #0f2a5e;   /* Fond header, etc. */
  --navy-mid:    #1240a8;   /* Fond stats bar */
  --navy-light:  #1e4799;
  --gold:        #1a56db;   /* Bleu roi - remplace doré */
  --gold-light:  #1240a8;   /* Accent hover */
  --bg:          #f0f4fb;   /* Gris-bleu très clair */
  --surface:     #ffffff;   /* Fond surface */
  --border:      #cdd5e8;   /* Gris-bleu doux */
  --txt:         #0f1e3d;   /* Bleu-noir */
  --txt-muted:   #4e5e7a;   /* Gris-bleu labels */
  --shadow:      0 1px 4px rgba(18,48,107,.13), 0 4px 14px rgba(18,48,107,.09);
  --shadow-lg:   0 8px 32px rgba(18,48,107,.18);
}
[data-theme="dark"] {
  --bg:#0f1117;--surface:#161b27;--border:#232b3a;
  --txt:#d4d8e0;--txt-muted:#7a8494;--navy:#1a2740;
  --navy-mid:#1e3050;--cream:#F8F5F0;
  --shadow:0 1px 3px rgba(0,0,0,.4),0 4px 12px rgba(0,0,0,.3);
  --shadow-lg:0 8px 32px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:13px;transition:background .2s,color .2s}
header{background:var(--navy);color:#fff;position:sticky;top:0;z-index:200;border-bottom:2px solid var(--gold)}
.hdr-inner{display:flex;align-items:center;gap:12px;padding:10px 20px;width:100%;box-sizing:border-box;margin:0 auto}
.hdr-badge{background:var(--gold);color:var(--navy);font-family:'Libre Baskerville',serif;font-weight:700;font-size:10px;padding:3px 9px;letter-spacing:.08em;text-transform:uppercase;border-radius:2px;flex-shrink:0}
.hdr-title{font-family:'Libre Baskerville',serif;font-size:17px;font-weight:700;flex:1}
.hdr-title span{color:var(--gold)}
.hdr-sub{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:.06em;text-transform:uppercase}
.hdr-actions{margin-left:auto;display:flex;gap:6px;align-items:center}
.stats-bar{background:var(--navy-mid);border-bottom:1px solid rgba(212,168,67,.3);padding:8px 20px}
.stats-inner{width:100%;box-sizing:border-box;margin:0 auto;display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.stat-item{display:flex;align-items:baseline;gap:5px}
.stat-value{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:500;color:var(--gold)}
.stat-label{font-size:9px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.05em}
.stat-div{width:1px;height:16px;background:rgba(255,255,255,.12)}
.tab-bar{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--surface);padding:0 20px;position:sticky;top:40px;z-index:190;}
.tab-btn{padding:9px 18px;font-family:'IBM Plex Sans',sans-serif;font-size:12px;font-weight:500;border:none;background:none;cursor:pointer;color:var(--txt-muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;box-sizing:border-box}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-btn:hover:not(.active){color:var(--txt)}
.app-layout{display:flex;width:100%;margin:0 auto}
.sidebar{width:240px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:14px 12px;position:sticky;top:104px;height:calc(100vh - 104px);overflow-y:auto;transition:all .15s ease;transform-origin:left;z-index:160;}
.sidebar.collapsed{width:0;padding-left:0;padding-right:0;border-right:none;overflow:hidden;}
.main-content{flex:1;min-width:0;padding:14px 16px 16px 18px;transition:padding .15s ease;overflow-x:auto;}
.sb-section{margin-bottom:18px}
.sb-title{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--txt-muted);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.search-input,.filter-select,.range-input{
  width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--radius);
  font-family:'IBM Plex Sans',sans-serif;font-size:12px;background:var(--bg);color:var(--txt);
  transition:border-color .15s;outline:none;margin-bottom:6px;
}
.search-input:focus,.filter-select:focus{border-color:var(--navy-light)}
.filter-select{cursor:pointer}
.filter-group{margin-bottom:8px}
.filter-label{font-size:10px;font-weight:500;color:var(--txt-muted);margin-bottom:4px;display:block}
.range-inputs{display:flex;gap:5px;align-items:center}
.range-sep{color:var(--txt-muted);font-size:11px;flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--radius);font-family:'IBM Plex Sans',sans-serif;font-size:11px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:var(--navy);color:#fff}
.btn-primary:hover{background:var(--navy-mid)}
.btn-gold{background:var(--gold);color:var(--navy)}
.btn-gold:hover{background:var(--gold-light)}
.btn-outline{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.3)}
.btn-outline:hover{background:rgba(255,255,255,.08)}
.btn-outline-dark{background:transparent;color:var(--txt);border:1.5px solid var(--border)}
.btn-outline-dark:hover{background:var(--border)}
.btn-sm{padding:4px 9px;font-size:10px}
.btn-full{width:100%;justify-content:center;margin-bottom:6px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--surface);padding:8px 10px;text-align:left;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--txt-muted);border-bottom:2px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:var(--txt)}
td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr{cursor:pointer;transition:background .1s}
tbody tr:hover{background:rgba(212,168,67,.06)}
tbody tr.selected{background:rgba(212,168,67,.12)}
.code-badge{background:rgba(212,168,67,.15);color:var(--gold);font-family:'IBM Plex Mono',monospace;font-size:10px;padding:2px 6px;border-radius:3px;font-weight:500}
.cp-tag{background:var(--border);color:var(--txt-muted);font-size:10px;padding:2px 6px;border-radius:3px}
.canton-badge{background:rgba(45,90,142,.2);color:#7ab0e0;font-size:10px;padding:2px 7px;border-radius:3px;white-space:nowrap}
.arr-badge{background:rgba(100,180,100,.15);color:#7dba7d;font-size:10px;padding:2px 6px;border-radius:3px}
.epci-badge{background:rgba(139,92,246,.15);color:#a78bfa;font-size:10px;padding:2px 6px;border-radius:3px;white-space:nowrap}
.density-badge{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:500}
.density-urban{background:rgba(239,68,68,.15);color:#ef4444}
.density-periurban{background:rgba(245,158,11,.15);color:#f59e0b}
.density-rural{background:rgba(34,197,94,.15);color:#22c55e}
.density-very-rural{background:rgba(148,163,184,.15);color:#94a3b8}
.pop-bar-wrapper{display:flex;align-items:center;gap:7px}
.pop-bar{height:5px;width:70px;background:var(--border);border-radius:9px;overflow:hidden;flex-shrink:0}
.pop-bar-fill{height:100%;background:var(--gold);border-radius:9px}
.pop-num{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--txt)}
.surface-val{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--txt-muted)}
.link-btn{display:inline-block;padding:2px 7px;border-radius:3px;border:1px solid var(--border);font-size:10px;color:var(--txt-muted);text-decoration:none;margin-right:3px;transition:all .12s}
.link-btn:hover{border-color:var(--gold);color:var(--gold)}
.pagination-bar{display:flex;gap:5px;align-items:center;margin-top:14px;justify-content:center;flex-wrap:wrap}
.page-btn{padding:5px 10px;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--txt);font-size:11px;cursor:pointer;transition:all .12s}
.page-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold)}
.page-btn.active{background:var(--gold);border-color:var(--gold);color:var(--navy);font-weight:600}
.page-btn:disabled{opacity:.4;cursor:default}
.detail-panel{position:fixed;top:0;right:-500px;width:500px;height:100vh;background:var(--surface);border-left:1px solid var(--border);z-index:2000;overflow-y:auto;transition:right .25s cubic-bezier(.16,1,.3,1);box-shadow:var(--shadow-lg)}
.detail-panel.open{right:0}
.detail-hdr{background:#0D2340;color:#fff;padding:16px 20px;display:flex;align-items:flex-start;gap:10px;border-bottom:2px solid var(--gold)}
.detail-close{background:none;border:none;color:rgba(255,255,255,.6);font-size:20px;cursor:pointer;margin-left:auto;padding:0;line-height:1;transition:color .12s}
.detail-close:hover{color:#fff}
.detail-name{font-family:'Libre Baskerville',serif;font-size:20px;font-weight:700}
.detail-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;font-size:11px;color:rgba(255,255,255,.6)}
.detail-meta span{background:rgba(255,255,255,.1);padding:2px 8px;border-radius:12px}
.detail-body{padding:14px}
.detail-section{margin-bottom:14px;padding:12px;background:var(--bg);border-radius:6px;border:1px solid var(--border)}
.detail-section-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--gold);margin-bottom:10px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.detail-kv{background:var(--surface);padding:8px;border-radius:4px}
.detail-kv-key{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--txt-muted);margin-bottom:2px}
.detail-kv-value{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:500;color:var(--txt)}
.age-chart,.csp-chart{display:flex;flex-direction:column;gap:6px}
.age-row,.csp-row{display:flex;align-items:center;gap:7px}
.age-label,.csp-label{font-size:10px;color:var(--txt-muted);width:120px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.age-bar-wrap,.csp-bar-wrap{flex:1;height:8px;background:var(--border);border-radius:9px;overflow:hidden}
.age-bar-fill,.csp-bar-fill{height:100%;border-radius:9px;transition:width .5s ease}
.age-pct,.csp-pct{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--txt-muted);min-width:46px;text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;line-height:1.3}
.detail-links{display:flex;flex-direction:column;gap:6px}
.detail-link{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:4px;text-decoration:none;color:var(--txt);font-size:11px;transition:all .12s}
.detail-link:hover{border-color:var(--gold);background:rgba(212,168,67,.06)}
.detail-link-icon{font-size:14px}
.briefing-area{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:12px;min-height:60px;margin-bottom:10px;font-size:12px;line-height:1.7;color:var(--txt)}
.briefing-loading{display:flex;align-items:center;gap:8px;font-style:italic;color:var(--txt-muted)}
.spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:40px 20px;color:var(--txt-muted);font-size:13px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;width:min(540px,95vw);max-height:80vh;overflow-y:auto}
.modal-title{font-family:'Libre Baskerville',serif;font-size:15px;font-weight:700;margin-bottom:4px}
.modal-sub{font-size:11px;color:var(--txt-muted);margin-bottom:16px;line-height:1.6}
.drop-zone{border:2px dashed var(--border);border-radius:6px;padding:24px;text-align:center;cursor:pointer;transition:all .15s;margin-bottom:12px}
.drop-zone.dragover,.drop-zone:hover{border-color:var(--gold);background:rgba(212,168,67,.05)}
.drop-zone-icon{font-size:28px;margin-bottom:6px}
.drop-zone-text{font-size:12px;color:var(--txt-muted)}
.import-status{font-size:11px;margin-top:8px;padding:8px 10px;border-radius:4px;border:1px solid var(--border)}
.notice-bar{background:rgba(212,168,67,.1);border:1px solid rgba(212,168,67,.3);border-radius:4px;padding:8px 12px;margin-bottom:12px;font-size:11px;color:var(--gold);display:flex;align-items:center;gap:8px}
.status-badge{font-size:9px;padding:2px 7px;border-radius:9px;font-weight:600;letter-spacing:.04em}
.status-partial{background:rgba(212,168,67,.15);color:var(--gold)}
.status-enriched{background:rgba(34,197,94,.15);color:#22c55e}
.result-count{font-size:11px;color:var(--txt-muted);margin-bottom:8px}
.canton-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-top:8px;}
.canton-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px;cursor:pointer;transition:all .15s; display:flex; flex-direction:column; box-sizing:border-box; height:100%;}
.canton-card:hover{border-color:var(--gold);box-shadow:var(--shadow)}
.canton-card-name{font-family:'Libre Baskerville',serif;font-size:14px;font-weight:700;color:var(--txt);margin-bottom:4px}
.canton-card-code{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--txt-muted);margin-bottom:8px}
.canton-stats{display:flex;gap:8px;flex-wrap:wrap}
.canton-stat{text-align:center;padding:6px 10px;background:var(--bg);border-radius:4px;flex:1;min-width:65px}
.canton-stat-val{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:500;color:var(--gold)}
.canton-stat-lbl{font-size:9px;color:var(--txt-muted);text-transform:uppercase;letter-spacing:.04em}
.canton-communes-list{margin-top:8px;font-size:10px;color:var(--txt-muted);border-top:1px solid var(--border);padding-top:6px;line-height:1.6}
.btn-canton-voir{flex-shrink:0;background:rgba(212,168,67,.15);border:1px solid var(--gold);color:var(--gold);border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-canton-syn{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(212,168,67,.25);color:var(--gold);border-radius:6px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;justify-content:space-between;align-items:center}
#mapContainer{width:100%;height:calc(100vh - 200px);min-height:400px;border-radius:6px;border:1px solid var(--border);overflow:hidden}
.theme-btn{background:none;border:1.5px solid rgba(255,255,255,.3);color:#fff;border-radius:4px;padding:5px 8px;cursor:pointer;font-size:14px;transition:all .15s}
.theme-btn:hover{background:rgba(255,255,255,.1)}
.enrich-tabs{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.enrich-tab{padding:4px 10px;border-radius:12px;border:1px solid var(--border);font-size:10px;cursor:pointer;transition:all .12s;color:var(--txt-muted)}
.enrich-tab.active{background:var(--gold);border-color:var(--gold);color:var(--navy);font-weight:600}
.load-overlay{position:fixed;inset:0;background:rgba(13,35,64,.85);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:#fff;font-family:'Libre Baskerville',serif}
.load-overlay.hidden{display:none}
.load-title{font-size:18px;font-weight:700}
.load-sub{font-size:12px;color:rgba(255,255,255,.5);font-family:'IBM Plex Sans',sans-serif}
.load-bar-wrap{width:280px;height:4px;background:rgba(255,255,255,.15);border-radius:4px;overflow:hidden}
.load-bar{height:100%;background:var(--gold);border-radius:4px;transition:width .3s ease;width:0}

/* ═══════════════════════════════════════════════════
   RESPONSIVE MOBILE (Android / iPhone ≤ 768px)
═══════════════════════════════════════════════════ */
.mobile-search-bar{display:none;position:fixed;top:0;left:0;right:0;z-index:220;background:var(--surface);border-bottom:1px solid var(--border);padding:8px 12px;gap:8px;align-items:center;}
.mobile-search-bar input {
  flex: 1;
  padding: 9px 12px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 14px;
  background: var(--bg);
  color: var(--txt);
  outline: none;
  -webkit-appearance: none;
}
.mobile-search-bar input:focus { border-color: var(--gold); }
.mobile-filter-btn {
  background: var(--navy);
  color: #fff;
  border: none;
  border-radius: 20px;
  padding: 9px 14px;
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 5px;
}
.mobile-filter-btn.active { background: var(--gold); color: var(--navy); }
.mobile-stat-bar {
  display: none;
  background: var(--navy-mid);
  border-bottom: 1px solid rgba(212,168,67,.25);
  padding: 6px 12px;
  font-size: 11px;
  color: rgba(255,255,255,.55);
  text-align: center;
}
.mobile-stat-bar strong { color: var(--gold); font-family: 'IBM Plex Mono', monospace; }
#mobileList { display: none; padding: 8px 10px 80px; }
.mob-commune-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color .15s, box-shadow .15s;
  -webkit-tap-highlight-color: transparent;
}
.mob-commune-card:active { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212,168,67,.15); }
.mob-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
.mob-card-name { font-family: 'Libre Baskerville', serif; font-size: 15px; font-weight: 700; color: var(--txt); line-height: 1.2; }
.mob-card-code { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--txt-muted); margin-top: 2px; }
.mob-card-pop { font-family: 'IBM Plex Mono', monospace; font-size: 16px; font-weight: 600; color: var(--gold); white-space: nowrap; flex-shrink: 0; }
.mob-card-pop-lbl { font-size: 9px; color: var(--txt-muted); text-transform: uppercase; text-align: right; letter-spacing: .05em; }
.mob-card-badges { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
.mob-pop-bar { height: 3px; background: var(--border); border-radius: 4px; margin-bottom: 8px; overflow: hidden; }
.mob-pop-bar-fill { height: 100%; background: var(--gold); border-radius: 4px; }
.mobile-filter-drawer {
  position: fixed;
  bottom: -100%;
  left: 0;
  right: 0;
  background: var(--surface);
  border-top: 2px solid var(--gold);
  border-radius: 16px 16px 0 0;
  z-index: 400;
  padding: 16px 16px 40px;
  max-height: 80vh;
  overflow-y: auto;
  transition: bottom .3s cubic-bezier(.16,1,.3,1);
  box-shadow: 0 -8px 32px rgba(0,0,0,.3);
}
.mobile-filter-drawer.open { bottom: 0; }
.drawer-handle { width: 40px; height: 4px; background: var(--border); border-radius: 4px; margin: 0 auto 14px; }
.drawer-title { font-family: 'Libre Baskerville', serif; font-size: 15px; font-weight: 700; margin-bottom: 14px; color: var(--txt); }
.drawer-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 399;
  display: none; opacity: 0; transition: opacity .25s;
}
.drawer-overlay.visible { display: block; opacity: 1; }
.drawer-section { margin-bottom: 14px; }
.drawer-section label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--txt-muted); display: block; margin-bottom: 5px; }
.drawer-section select, .drawer-section input[type="text"] {
  width: 100%; padding: 10px 12px; border: 1.5px solid var(--border);
  border-radius: 8px; font-size: 14px; background: var(--bg); color: var(--txt);
  -webkit-appearance: none; outline: none; font-family: 'IBM Plex Sans', sans-serif;
}
.drawer-actions { display: flex; gap: 8px; margin-top: 16px; }
.drawer-actions button { flex: 1; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; }

  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  box-shadow: 0 2px 16px rgba(0,0,0,.5);
  transition: background .15s;
  backdrop-filter: blur(8px);
}
.pc-calques-btn:hover { background: rgba(26,58,96,.95); }
.pc-calques-panel {
  position: absolute;
  top: 100%;
  left: 0;
  z-index: 800;
  background: rgba(13,35,64,.97);
  border-radius: 12px;
  padding: 10px 14px;
  box-shadow: 0 4px 20px rgba(0,0,0,.5);
  backdrop-filter: blur(8px);
  min-width: 200px;
  display: none;
  flex-direction: column;
  gap: 8px;
  border: 1px solid rgba(212,168,67,.3);
}
.pc-calques-panel.open { display: flex; }
.pc-calques-title {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--gold);
  margin-bottom: 2px;
}
.pc-calques-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 5px 0;
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.pc-calques-row:last-child { border-bottom: none; }
.pc-color-input {
  width: 20px;
  height: 20px;
  border: none;
  border-radius: 4px;
  background: none;
  cursor: pointer;
  padding: 0;
  appearance: none;
  -webkit-appearance: none;
}
.pc-color-input::-webkit-color-swatch-wrapper { padding: 0; }
.pc-color-input::-webkit-color-swatch { border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; }
.pc-color-input::-moz-color-swatch { border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; }
.pc-calques-lbl {
  font-size: 11px;
  color: #fff;
  font-family: 'IBM Plex Sans', sans-serif;
}
.pc-calques-lbl.disabled { color: rgba(255,255,255,.3); font-style: italic; }
.pc-calques-lbl small { font-size: 9px; color: var(--gold); display: block; margin-top: 1px; }
.pc-toggle {
  position: relative;
  width: 32px;
  height: 17px;
  flex-shrink: 0;
}
.pc-toggle input { opacity: 0; width: 0; height: 0; }
.pc-toggle-slider {
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,.15);
  border-radius: 17px;
  cursor: pointer;
  transition: .2s;
}
.pc-toggle-slider:before {
  content: '';
  position: absolute;
  width: 13px;
  height: 13px;
  left: 2px;
  bottom: 2px;
  background: #fff;
  border-radius: 50%;
  transition: .2s;
}
.pc-toggle input:checked + .pc-toggle-slider { background: var(--gold); }
.pc-toggle input:checked + .pc-toggle-slider:before { transform: translateX(15px); }
.pc-toggle input:disabled + .pc-toggle-slider { opacity: .35; cursor: default; }

/* ── MARQUEURS COMMUNES PRINCIPALES ─────────────────── */
.chef-lieu-marker {
  display: flex;

  gap: 4px;

}

.chef-lieu-name {

  font-weight: 700;

/* ══ PANNEAU DÉTAIL BV ══════════════════════════════════════════════════════ */
#bvDetailPanel {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 3000;
  background: var(--surface, #0d2340);

  box-shadow: 0 8px 40px rgba(0,0,0,.7);

  width: 90vw;
  max-height: 80vh;
  overflow-y: auto;
  font-family: 'IBM Plex Sans', sans-serif;
  display: none;
}
#bvDetailPanel.open { display: block; }
.bvdp-overlay {
  position: fixed; inset: 0; z-index: 2999;
  background: rgba(0,0,0,.45);
  display: none;
}
.bvdp-overlay.open { display: block; }
.bvdp-hdr {
  display: flex; align-items: flex-start; justify-content: space-between;
  padding: 14px 16px 10px;
  border-bottom: 1px solid rgba(212,168,67,.3);
  position: sticky; top: 0;
  background: var(--surface, #0d2340);
  border-radius: 14px 14px 0 0;
  z-index: 1;
}
.bvdp-title { font-size: 15px; font-weight: 700; color: var(--gold, #D4A843); line-height: 1.3; }
.bvdp-sub   { font-size: 11px; color: rgba(255,255,255,.5); margin-top: 2px; }

}
.bvdp-close:hover { color: #fff; }
.bvdp-body { padding: 12px 16px 16px; }

/* Stats participation */
.bvdp-stats {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px; margin-bottom: 14px;
}
.bvdp-stat {
  background: rgba(255,255,255,.05);
  border-radius: 8px; padding: 8px 6px; text-align: center;
}
.bvdp-stat-val { font-size: 16px; font-weight: 700; color: var(--gold, #D4A843); }
.bvdp-stat-lbl { font-size: 9px; color: rgba(255,255,255,.5); text-transform: uppercase; letter-spacing: .05em; margin-top: 2px; }

/* Candidats */
.bvdp-cands-title {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .08em; color: rgba(255,255,255,.4);
  margin-bottom: 8px;
}
.bvdp-cand {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 8px;
  margin-bottom: 6px;
  background: rgba(255,255,255,.04);
  border-left: 3px solid transparent;
}

  background: rgba(212,168,67,.08);

}
.bvdp-cand-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.bvdp-cand-info { flex: 1; min-width: 0; }
.bvdp-cand-name { font-size: 11px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bvdp-cand-nuance { font-size: 10px; color: rgba(255,255,255,.45); }
.bvdp-cand-votes { text-align: right; flex-shrink: 0; }
.bvdp-cand-v  { font-size: 14px; font-weight: 700; color: #fff; }
.bvdp-cand-pct{ font-size: 10px; color: rgba(255,255,255,.5); }

/* Barre de progression */
.bvdp-bar-wrap { margin-top: 3px; height: 3px; background: rgba(255,255,255,.1); border-radius: 2px; }
.bvdp-bar { height: 3px; border-radius: 2px; transition: width .3s; }

/* ══ BLOC SYNTHÈSE CANTONALE ══════════════════════════════════════════════ */
#cantonSummary {
  display: none;
  margin-bottom: 14px;
  background: rgba(13,35,64,.95);
  border: 1.5px solid rgba(212,168,67,.35);

}

.csyn-title {
  font-size: 13px; font-weight: 700;

}

.csyn-block {
  flex: 0 0 240px;

.csyn-stat {

.csyn-stat-val { font-size: 14px; font-weight: 700; color: var(--gold, #D4A843); }
.csyn-stat-lbl { font-size: 9px; color: rgba(255,255,255,.4); margin-top: 1px; }
.csyn-no-data  { font-size: 11px; color: rgba(255,255,255,.3); font-style: italic; }

}

}
