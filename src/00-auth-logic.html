<div id="authScreen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg, #0d1b2a); z-index:999999; display:flex; justify-content:center; align-items:center; color:white; font-family:'IBM Plex Sans', sans-serif;">
  <div style="background:var(--surface, rgba(255,255,255,0.05)); padding:30px; border-radius:12px; border:1px solid var(--border, rgba(255,255,255,0.1)); max-width:400px; width:90%; text-align:center;">
    <h2 style="color:var(--gold, #d4af37); margin-top:0;">Accès Réservé</h2>
    <p style="font-size:14px; opacity:0.8; margin-bottom:20px;">Veuillez vous connecter pour accéder à l'Atlas.</p>
    
    <div id="authErrorBlock" style="display:none; color:#f87171; background:rgba(248,113,113,0.1); padding:10px; border-radius:6px; font-size:13px; margin-bottom:15px; border:1px solid rgba(248,113,113,0.3);"></div>
    
    <button onclick="if(window.AuthLogic) window.AuthLogic.loginGoogle()" id="authGoogleBtn" style="width:100%; background:#fff; color:#000; font-weight:700; padding:12px; border:none; border-radius:6px; cursor:pointer; font-size:15px; font-family:inherit; transition:opacity 0.2s; margin-bottom:15px; display:flex; justify-content:center; align-items:center; gap:10px;">
      <svg viewBox="0 0 24 24" width="18" height="18"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/><path fill="none" d="M1 1h22v22H1z"/></svg>
      Continuer avec Google
    </button>

    <div style="display:flex; align-items:center; margin:15px 0;">
       <div style="flex:1; height:1px; background:rgba(255,255,255,0.2);"></div>
       <span style="font-size:12px; color:rgba(255,255,255,0.5); padding:0 10px;">Ou avec email (si activé)</span>
       <div style="flex:1; height:1px; background:rgba(255,255,255,0.2);"></div>
    </div>

    <input type="email" id="authEmail" placeholder="Adresse email" style="width:100%; box-sizing:border-box; padding:12px; margin-bottom:15px; background:rgba(0,0,0,0.2); border:1px solid rgba(255,255,255,0.2); border-radius:6px; color:white; font-family:inherit;">
    <input type="password" id="authPassword" placeholder="Mot de passe" style="width:100%; box-sizing:border-box; padding:12px; margin-bottom:15px; background:rgba(0,0,0,0.2); border:1px solid rgba(255,255,255,0.2); border-radius:6px; color:white; font-family:inherit;">
    
    <button onclick="if(window.AuthLogic) window.AuthLogic.submitForm()" id="authSubmitBtn" style="width:100%; background:var(--gold, #d4af37); color:#000; font-weight:700; padding:12px; border:none; border-radius:6px; cursor:pointer; font-size:15px; font-family:inherit; transition:opacity 0.2s;">Se connecter</button>
    <button id="authResetBtn" onclick="if(window.AuthLogic) window.AuthLogic.resetPassword()" style="background:none; border:none; color:var(--gold, #d4af37); cursor:pointer; margin-top:15px; font-size:12px; text-decoration:underline;">Mot de passe oublié ?</button>
    
    <div style="margin-top:20px; font-size:13px; color:rgba(255,255,255,0.7);">
      <span id="authToggleText">Pas encore de compte ?</span>
      <button onclick="if(window.AuthLogic) window.AuthLogic.toggleMode()" id="authToggleBtn" style="background:none; border:none; color:var(--gold, #d4af37); cursor:pointer; text-decoration:underline; font-size:13px; font-family:inherit;">Créer un compte</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js";
  import { initializeFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js";

  const firebaseConfig = {
      projectId: "stalwart-ensign-4cf5x",
      appId: "1:361649912189:web:f0e83064fdbb9b3df47414",
      apiKey: "AIzaSyDE3R1hYCZBmnnUnt9ArOhxD9yvkRc5CAM",
      authDomain: "stalwart-ensign-4cf5x.firebaseapp.com",
      firestoreDatabaseId: "ai-studio-e4937bd5-65b9-47d6-955c-73091513d499",
      storageBucket: "stalwart-ensign-4cf5x.firebasestorage.app",
      messagingSenderId: "361649912189"
  };
  
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = initializeFirestore(app, { experimentalForceLongPolling: true }, firebaseConfig.firestoreDatabaseId);

  window.AuthLogic = {
    mode: 'login',
    toggleMode() {
      this.mode = this.mode === 'login' ? 'signup' : 'login';
      document.getElementById('authSubmitBtn').textContent = this.mode === 'login' ? 'Se connecter' : 'Créer un compte';
      document.getElementById('authToggleText').textContent = this.mode === 'login' ? 'Pas encore de compte ?' : 'Déjà un compte ?';
      document.getElementById('authToggleBtn').textContent = this.mode === 'login' ? 'Créer un compte' : 'Se connecter';
      document.getElementById('authResetBtn').style.display = this.mode === 'login' ? 'inline-block' : 'none';
    },
    async submitForm() {
       if (this.mode === 'login') {
          await this.login();
       } else {
          await this.signup();
       }
    },
    async signup() {
       const email = document.getElementById('authEmail').value;
       const password = document.getElementById('authPassword').value;
       const btn = document.getElementById('authSubmitBtn');
       if(!email || !password) return this.showError("Veuillez remplir tous les champs.");
       btn.style.opacity = '0.5';
       btn.textContent = 'Création...';
       this.hideError();
       try {
         await createUserWithEmailAndPassword(auth, email, password);
       } catch(e) {
         this.showError("Erreur d'inscription: " + e.message);
         btn.style.opacity = '1';
         btn.textContent = 'Créer un compte';
       }
    },
    async loginGoogle() {
       const provider = new GoogleAuthProvider();
       this.hideError();
       try {
         const result = await signInWithPopup(auth, provider);
         // Profile is created on first login via onAuthStateChanged if it doesn't exist
       } catch(e) {
         if (e.code === 'auth/popup-closed-by-user') {
            this.showError("Connexion annulée. Astuce : L'authentification Google via popup peut être bloquée dans cet aperçu. Cliquez sur le bouton 'Ouvrir dans un nouvel onglet' (en haut à droite) pour vous connecter.");
         } else {
            this.showError("Erreur connexion Google: " + e.message);
         }
       }
    },
    async login() {
       const email = document.getElementById('authEmail').value;
       const password = document.getElementById('authPassword').value;
       const btn = document.getElementById('authSubmitBtn');
       if(!email || !password) return this.showError("Veuillez remplir tous les champs.");
       btn.style.opacity = '0.5';
       btn.textContent = 'Connexion...';
       this.hideError();
       try {
         await signInWithEmailAndPassword(auth, email, password);
       } catch(e) {
         this.showError("Email ou mot de passe incorrect.");
         btn.style.opacity = '1';
         btn.textContent = 'Se connecter';
       }
    },
    async resetPassword() {
       const email = document.getElementById('authEmail').value;
       if(!email) return this.showError("Veuillez saisir votre adresse email puis cliquer ici.");
       try {
         await sendPasswordResetEmail(auth, email);
         alert("Un email de réinitialisation a été envoyé à : " + email);
       } catch(e) {
         this.showError("Erreur lors de l'envoi de l'email : " + e.message);
       }
    },
    showError(msg) {
       const el = document.getElementById('authErrorBlock');
       el.textContent = msg;
       el.style.display = 'block';
    },
    hideError() {
       document.getElementById('authErrorBlock').style.display = 'none';
    },
    signOutUtils() {
       signOut(auth);
    }
  };

  function applyCantonRestriction(userProfile) {
    if(userProfile.role === 'admin') {
       return; // No restrictions
    }
    
    // Attempt continuous enforcement until 'allCommunes' is ready
    let attempts = 0;
    const enforceFilters = setInterval(() => {
       attempts++;
       if(window.allCommunes && window.allCommunes.length > 0) {
           if(userProfile.cantons && Array.isArray(userProfile.cantons) && userProfile.cantons.length > 0) {
               window.userAllowedCantons = new Set(userProfile.cantons);
               window.allCommunes = window.allCommunes.filter(c => window.userAllowedCantons.has(c.codeCanton));
           } else {
               window.allCommunes = [];
           }
           
           if(window.populateSelects) window.populateSelects(); // Redo dropdowns based on restricted list
           if(window.applyFilters) window.applyFilters();
           
           clearInterval(enforceFilters);
       } else if(attempts > 50) {
           clearInterval(enforceFilters); // Timeout if taking more than 5s
       }
    }, 100);
  }

  onAuthStateChanged(auth, async (user) => {
     if(user) {
        try {
           const userRef = doc(db, "users", user.uid);
           let userDoc = await getDoc(userRef);
           
           if(!userDoc.exists()) {
               // Auto-create profile for first-time Google users
               const newProfile = {
                   email: user.email,
                   role: 'elu', 
                   cantons: [], // They see nothing first, an admin (you) must assign cantons in the Firestore console!
                   createdAt: serverTimestamp()
               };
               // We need rules to allow this. For now let's hope rules allow create if uid matches.
               try {
                  await setDoc(userRef, newProfile);
                  userDoc = await getDoc(userRef);
               } catch(ex) {
                  console.error("Profile creation error", ex);
                  // We'll let them through with an empty profile if writing fails
               }
           }

           if(userDoc.exists()) {
               const profile = userDoc.data();
               applyCantonRestriction(profile);
               
               // Show logout in header
               setTimeout(() => {
                 const hdrActions = document.querySelector('.hdr-actions');
                 if(hdrActions && !document.getElementById('logoutBtn')) {
                     const loBtn = document.createElement('button');
                     loBtn.id = 'logoutBtn';
                     loBtn.className = 'btn btn-outline btn-sm';
                     loBtn.innerHTML = 'Déconnexion';
                     loBtn.onclick = () => window.AuthLogic.signOutUtils();
                     hdrActions.prepend(loBtn);
                 }
               }, 1000);
               
               document.getElementById('authScreen').style.display = 'none';
           } else {
               window.AuthLogic.showError("Compte actif mais impossible de créer/lire le profil. Contactez un administrateur.");
               // signOut(auth); // Keep them logged in but restrict to zero cantons if it fails
           }
        } catch(e) {
           console.error("Firestore read error", e);
           window.AuthLogic.showError("Erreur d'accès à la base de données. " + e.message);
           signOut(auth);
        }
     } else {
        document.getElementById('authScreen').style.display = 'flex';
        const btn = document.getElementById('authSubmitBtn');
        if (btn) {
           btn.style.opacity = '1';
           btn.textContent = window.AuthLogic.mode === 'login' ? 'Se connecter' : 'Créer un compte';
        }
        // Reload page if logging out to clear the memory states
        if (window.hasLoggedInBefore) {
            window.location.reload();
        }
     }
     window.hasLoggedInBefore = true;
  });
</script>
