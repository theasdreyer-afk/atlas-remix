

<script>
/* ══ SYNTHÈSE OISE GLOBALE (PC) ══════════════════════════════════════════ */
var _oiseSummaryLoaded = false;
function toggleOiseSummary() { var content=document.getElementById('oiseSummaryContent'); var chev=document.getElementById('oiseSummaryChevron'); if(!content) return; var open=(content.style.display==='block'); content.style.display=open?'none':'block'; if(chev) chev.textContent=open?'▶ Afficher':'▲ Réduire'; if(!open) { var ageAgg=_aggCantonAge(allCommunes); var cspAgg=_aggCantonCSP(allCommunes); var elec1=_aggCantonElec(allCommunes, 1); var elec2=_aggCantonElec(allCommunes, 2); var elec1_15=_aggCantonElec(allCommunes, 1, true); var elec2_15=_aggCantonElec(allCommunes, 2, true); var aacTot = 0, aacM1 = 0, aacM2 = 0, pPT = 0, pAA = 0, pAE = 0; if (typeof enrichedData !== 'undefined') { allCommunes.forEach(c => { var enr=enrichedData[c.code]||{}; if(enr.passPermis) { pPT += (enr.passPermis.total||0); } if(enr.passAvenir) { pAA += (enr.passAvenir.acceptes||0); pAE += (enr.passAvenir.enregistrements||0); } }); } if(typeof window.AAC_DATA !== 'undefined' && window.AAC_DATA.length > 0) { window.AAC_DATA.forEach(r => { let raw = String(r.montant_vote).replace(/[^0-9,.-]/g, '').replace(',', '.'); let amt = parseFloat(raw) || 0; aacTot += amt; if(parseInt(r.annee) >= 2015 && parseInt(r.annee) <= 2021) aacM1 += amt; if(parseInt(r.annee) >= 2021 && parseInt(r.annee) <= 2028) aacM2 += amt; }); } var noData='<div class="csyn-no-data">Importez les fichiers CSV/XLSX pour afficher.</div>'; var html='<div class="csyn-grid">'; html += '<div class="csyn-block"><div class="csyn-block-title">👤 Population par âge</div>'+(ageAgg?_renderAgeBlock(ageAgg,'csyn'):noData)+'</div>'; html += '<div class="csyn-block"><div class="csyn-block-title">👔 Catégories socio-prof.</div>'+(cspAgg?_renderCSPBlock(cspAgg,'csyn'):noData)+'</div>'; html += '<div class="csyn-block"><div class="csyn-block-title">✨ Dispositifs Citoyens (Dép.)</div>';if(pPT>0 || pAA>0 || pAE>0){html += '<div class="csyn-compact-rows">';if(pPT>0)html += '<div class="csyn-kv-row"><span style="color:var(--txt-muted);">🚗 Pass Permis (Total)</span><strong>'+pPT+'</strong></div>';if(pAE>0)html += '<div class="csyn-kv-row"><span style="color:var(--txt-muted);">🎓 Pass Avenir (Enregistrés)</span><strong>'+pAE+'</strong></div>';if(pAA>0)html += '<div class="csyn-kv-row"><span style="color:var(--txt-muted);">🎓 Pass Avenir (Acceptés)</span><strong>'+pAA+'</strong></div>';html += '</div></div>';}else{html += noData+'</div>';}html += '<div class="csyn-block"><div class="csyn-block-title">💰 Aide aux communes (Dép.)</div>';if(aacTot>0){html += '<div class="csyn-compact-rows">';if(aacM1>0)html += '<div class="csyn-kv-row"><span style="color:var(--txt-muted);">Total 2015-2021</span><strong>'+aacM1.toLocaleString('fr-FR')+' €</strong></div>';if(aacM2>0)html += '<div class="csyn-kv-row"><span style="color:var(--txt-muted);">Total 2021-2028</span><strong>'+aacM2.toLocaleString('fr-FR')+' €</strong></div>';html += '<div class="csyn-kv-row" style="margin-top:6px;border-top:1px solid rgba(255,255,255,0.1);padding-top:6px;"><span style="color:var(--txt-muted);">Total général</span><strong>'+aacTot.toLocaleString('fr-FR')+' €</strong></div>';html += '</div></div>';}else{html += noData+'</div>';} html += '<div class="csyn-block"><div class="csyn-block-title">🗳️ T1 — Élec. départ. 2015</div>'+_renderElecBlock(elec1_15,1,'csyn')+'</div>'; if(elec2_15) html += '<div class="csyn-block"><div class="csyn-block-title">🗳️ T2 — Élec. départ. 2015</div>'+_renderElecBlock(elec2_15,2,'csyn')+'</div>'; html += '<div class="csyn-block"><div class="csyn-block-title">🗳️ T1 — Élec. départ. 2021</div>'+(elec1?_renderElecBlock(elec1,1,'csyn'):noData)+'</div>'; html += '<div class="csyn-block"><div class="csyn-block-title">🗳️ T2 — Élec. départ. 2021</div>'+(elec2?_renderElecBlock(elec2,2,'csyn'):noData)+'</div>'; html += '</div>'; content.innerHTML=html; _oiseSummaryLoaded=true; } }

function _showOiseSummaryBar(visible) {
  var bar = document.getElementById('oiseSummaryBar');
  if(bar) bar.style.display = visible ? 'block' : 'none';
}

</script>
